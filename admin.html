<!DOCTYPE html>
<html>
<head>
<title>Admin PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center}
textarea,select{width:90%;padding:10px;margin:10px;border-radius:8px}
button{padding:10px;margin:5px;border-radius:8px;cursor:pointer}
.box{background:#222;padding:10px;margin:10px auto;width:90%;border-radius:10px}
</style>

</head>

<body>

<h2>🔥 Admin Panel PRO</h2>

<div id="adminPanel" style="display:none;">

<select id="category">
  <option value="attitude">Attitude</option>
  <option value="love">Love</option>
  <option value="sad">Sad</option>
</select>

<textarea id="text"></textarea>

<button onclick="addShayari()">➕ Add Shayari</button>

<h3>📋 Live Shayari</h3>
<div id="list"></div>

</div>

<script>

const ADMIN_EMAIL = "smelaskar@gmail.com";

firebase.auth().onAuthStateChanged(user => {

    if(!user){
        window.location = "admin-login.html";
        return;
    }

    if(user.email !== ADMIN_EMAIL){
        alert("Not Authorized ❌");
        firebase.auth().signOut();
        return;
    }

    document.getElementById("adminPanel").style.display = "block";
});

function addShayari(){

    let cat = document.getElementById("category").value;
    let text = document.getElementById("text").value;

    if(text.trim() === "") return alert("Write something ❌");

    db.collection("shayari").add({
        category: cat,
        text: text,
        time: Date.now()
    });

    document.getElementById("text").value = "";
}

db.collection("shayari").orderBy("time","desc")
.onSnapshot(snapshot => {

    let list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {

        let d = doc.data();

        list.innerHTML += `
        <div class="box">
            <b>${d.category}</b><br><br>
            ${d.text}<br><br>

            <button onclick="editShayari('${doc.id}','${d.text}')">✏ Edit</button>
            <button onclick="deleteShayari('${doc.id}')">🗑 Delete</button>
        </div>`;
    });

});

function deleteShayari(id){
    db.collection("shayari").doc(id).delete();
}

function editShayari(id,text){
    let newText = prompt("Edit:", text);
    if(newText){
        db.collection("shayari").doc(id).update({text:newText});
    }
}

</script>

</body>
</html>
